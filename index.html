<!doctype html>
<html lang="fa" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Steel ERP • Information Flow Simulator</title><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="css/main.css"><link rel="stylesheet" href="css/animations.css"><link rel="stylesheet" href="css/dashboard.css"></head>
<body><div class="app-shell"><header class="topbar"><div class="brand"><span class="brand-mark">⌬</span><div><b>STEEL ERP</b><small>INFORMATION FLOW SIMULATOR</small></div></div><div class="top-actions"><span class="live-dot"></span><span id="clock"></span><button id="themeBtn" title="Theme">☼</button><button id="fullscreenBtn">⛶</button></div></header>
